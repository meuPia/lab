<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>meuPiá Lab</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
    <style>
      /* Variáveis de Tema Mestre */
      :root {
        --bg-color: #ffffff;
        --text-color: #333333;
        --header-bg: #f0f0f0;
        --border-color: #dddddd;
      }

      [data-theme="dark"] {
        --bg-color: #1e1e1e;
        --text-color: #ffffff;
        --header-bg: #2d2d2d;
        --border-color: #333333;
      }

      body {
        margin: 0; padding: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex; flex-direction: column; height: 100vh;
        transition: background-color 0.3s, color 0.3s;
      }
      
      header {
        background: var(--header-bg);
        padding: 10px 20px;
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 2px solid #4CAF50;
        transition: background-color 0.3s;
      }

      /* Alinha os grupos de ações no header */
      .actions { 
        display: flex; 
        align-items: center; 
        gap: 15px; 
      }

      /* Coloca os ícones lado a lado e cria um "fundo" de agrupamento */
      .action-group {
        display: flex;
        align-items: center;
        gap: 4px;
        background: rgba(128, 128, 128, 0.1); /* Fundo translúcido sutil */
        padding: 4px;
        border-radius: 6px;
      }

      /* Transforma os botões normais em quadrados perfeitos para ícones */
      .action-group button, .action-group a {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px;
        background: transparent;
        color: var(--text-color);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      .action-group button:hover, .action-group a:hover {
        background: rgba(128, 128, 128, 0.2);
      }

      /* A linha vertical separando os blocos (ex: entre salvar e undo) */
      .divider {
        width: 1px;
        height: 20px;
        background-color: var(--border-color);
        margin: 0 4px;
      }

      /* O botão "Rodar Código" mantém a cor de destaque e alinha o ícone com o texto */
      #run-btn { 
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px; 
        border: none; 
        border-radius: 4px;
        font-weight: bold; 
        font-size: 14px;
        background: #4CAF50; 
        color: white; 
        cursor: pointer;
        transition: background-color 0.2s;
      }
      
      #run-btn:hover:not(:disabled) { 
        background: #45a049; 
      }
      
      #run-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .ide-container { display: flex; flex: 1; overflow: hidden; }
      
      #editor-container { flex: 1; border-right: 1px solid var(--border-color); }
      #terminal-container { flex: 1; padding: 10px; }

      .cm-editor { height: 100%; } /* CodeMirror preenche o espaço */
      .logo-container {
        display: flex;
        align-items: center;
        gap: 12px; /* Espaço entre o logo e o texto */
        margin: 0;
        font-size: 1.5em;
        font-weight: bold;
      }

      .site-logo {
        height: 32px; /* Ajuste o tamanho do logo aqui se precisar */
        width: auto;
      }

    </style>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>

    <header>
      <h2 class="logo-container">
        <img src="/logo.svg" alt="Logo meuPiá" class="site-logo" /> 
        meuPiá Lab
      </h2>
      
      <div class="actions">
        <div class="action-group">
          <button id="open-btn" title="Abrir Arquivo"><i data-lucide="folder-open"></i></button>
          <button id="save-btn" title="Salvar Arquivo"><i data-lucide="save"></i></button>
          <div class="divider"></div>
          <button id="undo-btn" title="Desfazer"><i data-lucide="undo"></i></button>
          <button id="redo-btn" title="Refazer"><i data-lucide="redo"></i></button>
          <div class="divider"></div>
          <button id="reset-btn" title="Limpar Tudo"><i data-lucide="trash-2"></i></button>
        </div>

        <div class="action-group">
          <button id="theme-btn" title="Alternar Tema"><i data-lucide="sun"></i></button>
          <button id="settings-btn" title="Configurações"><i data-lucide="settings"></i></button>
          <a href="URL_DO_SEU_APOIA_SE" target="_blank" id="sponsor-btn" title="Apoie o Projeto"><i data-lucide="coffee"></i></a>
        </div>

        <button id="run-btn" disabled><i data-lucide="play"></i> Rodar</button>
      </div>
    </header>
    <div class="ide-container">
      <div id="editor-container"></div>
      <div id="terminal-container"></div>
    </div>

    <script type="module" src="/src/main.js"></script>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
