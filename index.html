<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>meuPiá Lab</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
    <style>
      /* Variáveis de Tema Mestre */
      :root {
        --bg-color: #ffffff;
        --text-color: #333333;
        --header-bg: #f0f0f0;
        --border-color: #dddddd;
      }

      [data-theme="dark"] {
        --bg-color: #1e1e1e;
        --text-color: #ffffff;
        --header-bg: #2d2d2d;
        --border-color: #333333;
      }

      body {
        margin: 0; padding: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex; flex-direction: column; height: 100vh;
        transition: background-color 0.3s, color 0.3s;
      }
      
      header {
        background: var(--header-bg);
        padding: 10px 20px;
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 2px solid #4CAF50;
        transition: background-color 0.3s;
      }

      /* Alinha os grupos de ações no header */
      .actions { 
        display: flex; 
        align-items: center; 
        gap: 15px; 
      }

      /* Coloca os ícones lado a lado e cria um "fundo" de agrupamento */
      .action-group {
        display: flex;
        align-items: center;
        gap: 4px;
        background: rgba(128, 128, 128, 0.1); /* Fundo translúcido sutil */
        padding: 4px;
        border-radius: 6px;
      }

      /* Transforma os botões normais em quadrados perfeitos para ícones */
      .action-group button, .action-group a {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px;
        background: transparent;
        color: var(--text-color);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      .action-group button:hover, .action-group a:hover {
        background: rgba(128, 128, 128, 0.2);
      }

      /* A linha vertical separando os blocos (ex: entre salvar e undo) */
      .divider {
        width: 1px;
        height: 20px;
        background-color: var(--border-color);
        margin: 0 4px;
      }

      /* O botão "Rodar Código" mantém a cor de destaque e alinha o ícone com o texto */
      #run-btn { 
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px; 
        border: none; 
        border-radius: 4px;
        font-weight: bold; 
        font-size: 14px;
        background: #4CAF50; 
        color: white; 
        cursor: pointer;
        transition: background-color 0.2s;
      }
      
      #run-btn:hover:not(:disabled) { 
        background: #45a049; 
      }
      
      #run-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .ide-container { display: flex; flex: 1; overflow: hidden; }
      
      #editor-container { flex: 1; border-right: 1px solid var(--border-color); }
      #terminal-container { flex: 1; padding: 10px; }

      .cm-editor { height: 100%; } /* CodeMirror preenche o espaço */
      .logo-container {
        display: flex;
        align-items: center;
        gap: 12px; /* Espaço entre o logo e o texto */
        margin: 0;
        font-size: 1.5em;
        font-weight: bold;
      }

      .site-logo {
        height: 32px; /* Ajuste o tamanho do logo aqui se precisar */
        width: auto;
      }

      .hidden { display: none !important; }
      
      .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0, 0, 0, 0.6);
        display: flex; justify-content: center; align-items: center;
        z-index: 1000;
        backdrop-filter: blur(2px);
      }
      
      .modal-content {
        background: var(--bg-color);
        border: 1px solid var(--border-color);
        border-radius: 8px; width: 450px; max-width: 90%;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      }
      
      .modal-header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 15px 20px;
        border-bottom: 1px solid var(--border-color);
        background: var(--header-bg); border-radius: 8px 8px 0 0;
      }
      
      .modal-header h3 { margin: 0; display: flex; align-items: center; gap: 8px; font-size: 1.1em;}
      
      .icon-btn { background: transparent; border: none; color: var(--text-color); cursor: pointer; padding: 4px; display: flex;}
      .icon-btn:hover { background: rgba(128,128,128,0.2); border-radius: 4px; }
      
      .modal-body { padding: 20px; }
      
      .setting-group { margin-bottom: 20px; }
      .setting-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9em; color: var(--text-color); }
      
      .setting-group select, .setting-group input[type="range"] { width: 100%; }
      .setting-group select {
        padding: 10px; border-radius: 4px; border: 1px solid var(--border-color);
        background: var(--bg-color); color: var(--text-color); font-size: 14px;
      }
      
      .slider-container { display: flex; align-items: center; gap: 15px; }
      #fontsize-display { font-weight: bold; min-width: 40px; }

      .cm-editor { 
        height: 100%; 
        font-size: var(--editor-font-size, 14px); /* Fonte controlada por JS */
      }
      
      .ide-container.layout-horizontal { flex-direction: row; }
      .ide-container.layout-horizontal #editor-container { border-right: 1px solid var(--border-color); border-bottom: none; }
      
      .ide-container.layout-vertical { flex-direction: column; }
      .ide-container.layout-vertical #editor-container { border-bottom: 1px solid var(--border-color); border-right: none; height: 60%; flex: none; }
      .ide-container.layout-vertical #terminal-container { height: 40%; flex: none; }

    </style>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>

    <header>
      <h2 class="logo-container">
        <img src="/logo.svg" alt="Logo meuPiá" class="site-logo" /> 
        meuPiá Lab
      </h2>
      
      <div class="actions">
        <div class="action-group">
          <button id="open-btn" title="Abrir Arquivo"><i data-lucide="folder-open"></i></button>
          <button id="save-btn" title="Salvar Arquivo"><i data-lucide="save"></i></button>
          <div class="divider"></div>
          <button id="undo-btn" title="Desfazer"><i data-lucide="undo"></i></button>
          <button id="redo-btn" title="Refazer"><i data-lucide="redo"></i></button>
          <div class="divider"></div>
          <button id="reset-btn" title="Limpar Tudo"><i data-lucide="trash-2"></i></button>
        </div>

        <div class="action-group">
          <button id="theme-btn" title="Alternar Tema"><i data-lucide="sun"></i></button>
          <button id="settings-btn" title="Configurações"><i data-lucide="settings"></i></button>
          <a href="URL_DO_SEU_APOIA_SE" target="_blank" id="sponsor-btn" title="Apoie o Projeto"><i data-lucide="coffee"></i></a>
        </div>

        <button id="run-btn" disabled><i data-lucide="play"></i> Rodar</button>
      </div>
    </header>
    <div id="settings-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3><i data-lucide="settings"></i> Configurações</h3>
          <button id="close-settings-btn" class="icon-btn" title="Fechar"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <div class="setting-group">
            <label for="layout-select">Direção do Layout</label>
            <select id="layout-select">
              <option value="horizontal">Lado a Lado (Editor Esq, Terminal Dir)</option>
              <option value="vertical">Empilhado (Editor Cima, Terminal Baixo)</option>
            </select>
          </div>
          <div class="setting-group">
            <label for="fontsize-input">Tamanho da Fonte</label>
            <div class="slider-container">
              <input type="range" id="fontsize-input" min="12" max="24" step="1" value="14">
              <span id="fontsize-display">14px</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="ide-container">
      <div id="editor-container"></div>
      <div id="terminal-container"></div>
    </div>

    <script type="module" src="/src/main.js"></script>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
